<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="stylesheet.css">
  <title>Shopping Cart</ShoppingCart></title>
</head>
<body>
    <h1>My Shopping Cart</h1>

    <h2>Add New Item</h2>
    <input type="text" id="new-name" placeholder="Item Name">
    <input type="number" id="new-price" placeholder="Price" step="0.01">
    <input type="number" id="new-quantity" placeholder="Quantity" min="1">
    <button id="add-item-btn">Add Item</button>

    <ul id="cart-list"></ul>

  <h2>Total: €<span id="total">0.00</span></h2>

  <script src="script.js"></script>
</body>
</html>
